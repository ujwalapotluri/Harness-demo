apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harness-demo
  template:
    metadata:
      labels:
        app: harness-demo
    spec:
      containers:
      - name: harness-demo
        image: YOUR_DOCKERHUB_USERNAME/harness-demo:latest
        ports:
        - containerPort: 3000
